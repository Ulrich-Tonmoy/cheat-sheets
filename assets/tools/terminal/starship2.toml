format = "[ $symbol( $version) ]($style)"

[rust]
symbol = ""
format = "[ $symbol( $version) ]($style)"

[golang]
symbol = ""
style = "fg:#00ADD8"
format = "[ $symbol( $version) ]($style)"
detect_files = ["go.mod"]

[php]
symbol = ""
format = "[ $symbol( $version) ]($style)"

[java]
symbol = " "
format = "[ $symbol( $version) ]($style)"

[kotlin]
